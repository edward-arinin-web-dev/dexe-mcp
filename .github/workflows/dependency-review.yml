name: Dependency Review

# Runs on every pull request that touches package manifests. Diffs the changed
# dependency graph against GitHub's Advisory Database and fails the check if
# any added/updated dep introduces a high-or-critical CVE. Also flags forbidden
# licenses. Posts a summary comment on the PR for human reviewers.
#
# No secrets required. Uses default GITHUB_TOKEN.

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write  # required for comment-summary-in-pr

jobs:
  dependency-review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Review dependencies
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high
          comment-summary-in-pr: on-failure
          # License allowlist — MIT-compatible only. Add to deny-licenses to
          # forbid copyleft creeping into the runtime dep graph.
          deny-licenses: GPL-2.0, GPL-3.0, AGPL-1.0, AGPL-3.0
