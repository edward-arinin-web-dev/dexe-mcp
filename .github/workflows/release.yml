name: Release

# Triggered by pushing a semver tag (e.g. `v0.5.9`). The job verifies the tag
# matches package.json, runs typecheck/build/tests, then publishes to npm with
# a provenance attestation linking the tarball to this commit + workflow run.
#
# Requirements:
#   - Repo secret NPM_TOKEN  (npm automation token with publish rights)
#   - id-token: write permission (granted below; needed for OIDC)
#
# To cut a release:
#   1. Bump package.json version (and CHANGELOG/README per release discipline)
#   2. git tag vX.Y.Z && git push --tags
#   3. This workflow publishes and the provenance badge appears on npmjs.com

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Verify tag matches package.json version
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::Tag ${GITHUB_REF_NAME} does not match package.json version ${PKG_VERSION}"
            exit 1
          fi
          echo "Tag and package.json agree on ${PKG_VERSION}"

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      - name: Publish to npm with provenance
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
