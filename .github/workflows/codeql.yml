name: CodeQL

# GitHub-native SAST. Scans JS/TS source for known vulnerability patterns
# (prototype pollution, command injection, ReDoS, unsafe deserialization,
# path traversal, etc.). Uses the `security-extended` query suite, which is
# the default-plus pack curated by GitHub Security Lab — covers everything
# in `security-and-quality` minus a few low-signal style checks.
#
# Triggers:
#   - push to main: scan after merges
#   - pull_request to main: catch new findings before merge
#   - schedule: weekly on Sunday at 05:00 UTC (offset from Scorecard cron)
#
# Results upload to GitHub code-scanning (Security tab). No secrets needed.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 5 * * 0'

permissions:
  contents: read

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        language: ['javascript-typescript']

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          queries: security-extended

      # No build step required — CodeQL auto-extracts JS/TS from source.
      # If a compile step were ever needed, it would go here.

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"
