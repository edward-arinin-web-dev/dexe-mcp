name: CI

on:
  push:
    branches: [main]
  pull_request:

# Least-privilege default per OSSF Scorecard Token-Permissions check.
# This workflow only reads source; no write scopes required.
permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        node: ["20", "22"]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          cache: "npm"
      - run: npm ci
      - run: npm run typecheck
      # Knowledge-layer drift guard: docs/PLAYBOOK.md + skill generated regions
      # must match src/knowledge/ (regenerate with `npm run gen:knowledge`).
      - run: npm run gen:knowledge:check
      - run: npm run build
      - run: npm test
      # Frontend↔MCP byte-diff for OTC calldata (needs dist/ from the build
      # step). Rotted silently while it lived outside CI — see 2026-07-03
      # OTC audit (H-10 vestingPercentage rescale broke a fixture unnoticed).
      - run: npm run test:compat

  # Supply-chain guard: install strictly from the committed package-lock.json and
  # fail on any drift between package.json, the lockfile, and the resolved tree.
  verify-lockfile:
    name: Verify lockfile integrity
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"
      # `npm ci` aborts (non-zero) if package.json and package-lock.json are out
      # of sync, and — unlike `npm install` — never rewrites the lockfile. A
      # stale or hand-edited lockfile fails the build right here.
      - name: Clean install from committed lockfile
        run: npm ci
      # Belt-and-suspenders: prove `npm ci` did not mutate the committed lockfile.
      - name: Assert lockfile unchanged
        run: git diff --exit-code package-lock.json
      # Integrity check: the full installed tree must be internally consistent —
      # no missing, extraneous, or invalidly-resolved dependencies. `npm ls`
      # exits non-zero on any of these, catching override/peer drift.
      - name: Validate dependency tree
        run: npm ls --all
